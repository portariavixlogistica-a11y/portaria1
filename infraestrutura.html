<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Infraestrutura</title>

  <style>
    body {
      margin: 0;
      background-color: black;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
    }

    #texto {
      font-size: 80px;
      color: white;
      display: none;
    }

    .piscar {
      animation: piscar 1s infinite;
    }

    @keyframes piscar {
      0% { background-color: green; }
      50% { background-color: black; }
      100% { background-color: green; }
    }
  </style>
</head>

<body>

<div id="texto">PORTARIA</div>

<script>
const url = "COLE_SUA_URL_AQUI"; // 👈 COLE SUA URL AQUI

let ativo = false;

function verificar() {
  fetch(url + "?setor=INFRAESTRUTURA")
    .then(res => res.text())
    .then(valor => {

      if (valor == "1") {

        if (!ativo) {
          ativo = true;

          document.getElementById("texto").style.display = "block";
          document.body.classList.add("piscar");
        }

      } else {

        ativo = false;

        document.getElementById("texto").style.display = "none";
        document.body.classList.remove("piscar");
        document.body.style.backgroundColor = "black";
      }

    })
    .catch(err => console.log(err));
}

// verifica a cada 1 segundo (bem rápido 🔥)
setInterval(verificar, 1000);
</script>

</body>
</html>
