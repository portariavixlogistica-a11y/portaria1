<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Infraestrutura</title>

  <style>
    body {
      margin: 0;
      background: black;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
    }

    #tela {
      display: none;
      width: 100%;
      height: 100%;
      background: green;
      color: white;
      font-size: 80px;
      justify-content: center;
      align-items: center;
    }

    .piscar {
      animation: piscar 1s infinite;
    }

    @keyframes piscar {
      0% {opacity: 1;}
      50% {opacity: 0.2;}
      100% {opacity: 1;}
    }
  </style>
</head>

<body>

<div id="tela">PORTARIA</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbybca2Xxuly0C6sA6o2a1p1duiH9rUnSpJXDQdPHEYOwRuDWRsXzMFAIC7ecR85HPA/exec";

function verificar() {
  fetch(url + "?setor=INFRAESTRUTURA")
    .then(r => r.text())
    .then(v => {
      const tela = document.getElementById("tela");

      if (v.trim() == "1") {
        tela.style.display = "flex";
        tela.classList.add("piscar");
      } else {
        tela.style.display = "none";
        tela.classList.remove("piscar");
      }
    });
}

setInterval(verificar, 1000);
verificar();
</script>

</body>
</html>
