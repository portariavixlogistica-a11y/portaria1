<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Infraestrutura</title>

  <style>
    body {
      margin: 0;
      background-color: black;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
    }

    #tela {
      display: none;
      width: 100%;
      height: 100%;
      background-color: green;
      color: white;
      font-size: 60px;
      justify-content: center;
      align-items: center;
    }

    .piscar {
      animation: piscar 1s infinite;
    }

    @keyframes piscar {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }
  </style>
</head>

<body>

<div id="tela">PORTARIA</div>

<script>
const url = "COLE_SUA_URL_AQUI";

function verificar() {
  fetch(url + "?setor=INFRAESTRUTURA")
    .then(res => res.text())
    .then(valor => {

      const tela = document.getElementById("tela");

      if (valor == "1") {
        tela.style.display = "flex";
        tela.classList.add("piscar");
      } else {
        tela.style.display = "none";
        tela.classList.remove("piscar");
      }

    })
    .catch(err => console.log(err));
}

// verifica a cada 1 segundo
setInterval(verificar, 1000);

// roda uma vez ao abrir
verificar();
</script>

</body>
</html>
