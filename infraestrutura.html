<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Infraestrutura</title>

  <style>
    body {
      margin: 0;
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-size: 60px;
      font-family: Arial;
    }

    .alerta {
      background-color: green;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: piscar 1s infinite;
    }

    @keyframes piscar {
      0% { opacity: 1; }
      50% { opacity: 0.2; }
      100% { opacity: 1; }
    }
  </style>
</head>

<body>

<div id="tela">Aguardando...</div>

<script>
  const url = "https://script.google.com/macros/s/AKfycbzXHj1XDbSRs_VX7cn9riyMnJI8HRP7KDKrCg4HbyQjX147gkCZ7wKO2sei1CDuzpVP/exec";
  const setor = "INFRAESTRUTURA";

  async function verificar() {
    try {
      const resposta = await fetch(`${url}?setor=${setor}`);
      const texto = await resposta.text();

      const tela = document.getElementById("tela");

      if (texto == "1") {
        tela.innerHTML = '<div class="alerta">PORTARIA</div>';
      } else {
        tela.innerHTML = "Aguardando...";
      }

    } catch (erro) {
      console.error("Erro:", erro);
    }
  }

  // verifica a cada 2 segundos
  setInterval(verificar, 2000);

  // roda assim que abrir
  verificar();
</script>

</body>
</html>
