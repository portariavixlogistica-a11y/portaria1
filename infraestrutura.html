<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Infraestrutura</title>

  <style>
    body {
      margin: 0;
      background-color: black;
      height: 100vh;
      font-family: Arial;
    }

    #tela {
      display: none;
      width: 100%;
      height: 100%;
      background-color: green;
      color: white;
      font-size: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>

<body>

<div id="tela">PORTARIA</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbx6hnJsNGh8KrbieAa4PnOGyNCda-T-qrEqxK3wqOl5XkBLij3W1LjzAWj6QmQZeFNl/exec";

function verificar() {
  fetch(url + "?setor=INFRAESTRUTURA")
    .then(res => res.text())
    .then(valor => {

      const tela = document.getElementById("tela");

      if (valor == "1") {
        tela.style.display = "flex";
      } else {
        tela.style.display = "none";
      }

    })
    .catch(err => console.log(err));
}

setInterval(verificar, 2000);
</script>

</body>
</html>
