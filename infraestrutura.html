<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>INFRAESTRUTURA</title>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    #tela {
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 80px;
      font-weight: bold;
      color: white;
      background: green;
    }
  </style>
</head>

<body>

<div id="tela">
  PORTARIA
</div>

<script>
const setor = "INFRAESTRUTURA";

const url = "https://script.google.com/macros/s/AKfycbybca2Xxuly0C6sA6o2a1p1duiH9rUnSpJXDQdPHEYOwRuDWRsXzMFAIC7ecR85HPA/exec";

function verificar() {
  fetch(url)
    .then(res => res.text())
    .then(() => {
      fetch(url + "?setor=" + setor)
        .then(res => res.text())
        .then(valor => {
          if (valor == "1") {
            document.getElementById("tela").style.display = "flex";
          } else {
            document.getElementById("tela").style.display = "none";
          }
        });
    });
}

setInterval(verificar, 3000);
</script>

</body>
</html>
