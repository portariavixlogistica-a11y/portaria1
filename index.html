<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Painel Portaria</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    .card {
      border: 1px solid #ccc;
      padding: 15px;
      margin: 10px;
      display: inline-block;
      width: 200px;
    }

    .status {
      font-weight: bold;
      color: red;
    }

    .livre {
      color: green;
    }

    button {
      margin: 5px;
      padding: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Painel da Portaria</h1>

<!-- EXEMPLO INFRAESTRUTURA -->
<div class="card">
  <div>INFRAESTRUTURA</div>
  <div id="INFRAESTRUTURA" class="status livre">Livre</div>

  <button onclick="enviar('INFRAESTRUTURA','abrir')">Abrir</button>
  <button onclick="enviar('INFRAESTRUTURA','finalizar')">Finalizar</button>
</div>

<script>
function enviar(setor, acao) {

  const URL = "https://script.google.com/macros/s/AKfycbzXHj1XDbSRs_VX7cn9riyMnJI8HRP7KDKrCg4HbyQjX147gkCZ7wKO2sei1CDuzpVP/exec";

  const link = URL + "?setor=" + setor + "&acao=" + acao;

  fetch(link)
    .then(res => res.text())
    .then(dados => {
      console.log("Resposta:", dados);
    })
    .catch(erro => {
      console.error("Erro:", erro);
    });

  const status = document.getElementById(setor);

  if (acao === "abrir") {
    status.innerText = "Ocupado";
    status.className = "status";
  } else {
    status.innerText = "Livre";
    status.className = "status livre";
  }
}
</script>

</body>
</html>
