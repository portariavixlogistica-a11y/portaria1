<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Portaria</title>
</head>
<body>

<h2>Controle de Chamados</h2>

<button onclick="enviar('DP','abrir')">Abrir DP</button>
<button onclick="enviar('DP','finalizar')">Finalizar DP</button>

<br><br>

<button onclick="enviar('RH','abrir')">Abrir RH</button>
<button onclick="enviar('RH','finalizar')">Finalizar RH</button>

<br><br>

<button onclick="enviar('MANUTENCAO','abrir')">Abrir Manutenção</button>
<button onclick="enviar('MANUTENCAO','finalizar')">Finalizar Manutenção</button>

<br><br>

<button onclick="enviar('NUTEC','abrir')">Abrir NUTEC</button>
<button onclick="enviar('NUTEC','finalizar')">Finalizar NUTEC</button>

<br><br>

<button onclick="enviar('QSMS','abrir')">Abrir QSMS</button>
<button onclick="enviar('QSMS','finalizar')">Finalizar QSMS</button>

<br><br>

<button onclick="enviar('INFRAESTRUTURA','abrir')">Abrir Infraestrutura</button>
<button onclick="enviar('INFRAESTRUTURA','finalizar')">Finalizar Infraestrutura</button>

<br><br>

<button onclick="enviar('SUPRIMENTOS','abrir')">Abrir Suprimentos</button>
<button onclick="enviar('SUPRIMENTOS','finalizar')">Finalizar Suprimentos</button>

<script>
function enviar(setor, acao) {
  fetch("https://script.google.com/macros/s/AKfycbybca2Xxuly0C6sA6o2a1p1duiH9rUnSpJXDQdPHEYOwRuDWRsXzMFAIC7ecR85HPA/exec?setor=" + setor + "&acao=" + acao, {
    method: "GET",
    mode: "no-cors"
  })
  .then(() => {
    alert("Enviado com sucesso: " + setor + " - " + acao);
  })
  .catch(() => {
    alert("Erro ao enviar");
  });
}
</script>

</body>
</html>
