<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Portaria</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f4f6f9;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
}

.status {
  font-weight: bold;
  margin: 10px;
}

.livre { color: green; }
.ocupado { color: red; }

button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
}
</style>

</head>

<body>

<h1>Sistema de Chamados</h1>

<div class="container">

<div class="card"><h3>DP</h3><div id="DP" class="status">...</div>
<button onclick="enviar('DP','abrir')">Abrir</button>
<button onclick="enviar('DP','finalizar')">Finalizar</button></div>

<div class="card"><h3>RH</h3><div id="RH" class="status">...</div>
<button onclick="enviar('RH','abrir')">Abrir</button>
<button onclick="enviar('RH','finalizar')">Finalizar</button></div>

<div class="card"><h3>MANUTENÇÃO</h3><div id="MANUTENCAO" class="status">...</div>
<button onclick="enviar('MANUTENCAO','abrir')">Abrir</button>
<button onclick="enviar('MANUTENCAO','finalizar')">Finalizar</button></div>

<div class="card"><h3>NUTEC</h3><div id="NUTEC" class="status">...</div>
<button onclick="enviar('NUTEC','abrir')">Abrir</button>
<button onclick="enviar('NUTEC','finalizar')">Finalizar</button></div>

<div class="card"><h3>QSMS</h3><div id="QSMS" class="status">...</div>
<button onclick="enviar('QSMS','abrir')">Abrir</button>
<button onclick="enviar('QSMS','finalizar')">Finalizar</button></div>

<div class="card"><h3>INFRAESTRUTURA</h3><div id="INFRAESTRUTURA" class="status">...</div>
<button onclick="enviar('INFRAESTRUTURA','abrir')">Abrir</button>
<button onclick="enviar('INFRAESTRUTURA','finalizar')">Finalizar</button></div>

<div class="card"><h3>SUPRIMENTOS</h3><div id="SUPRIMENTOS" class="status">...</div>
<button onclick="enviar('SUPRIMENTOS','abrir')">Abrir</button>
<button onclick="enviar('SUPRIMENTOS','finalizar')">Finalizar</button></div>

</div>

<script>
var url = "https://script.google.com/macros/s/AKfycbybca2Xxuly0C6sA6o2a1p1duiH9rUnSpJXDQdPHEYOwRuDWRsXzMFAIC7ecR85HPA/exec";

function enviar(setor, acao) {
  fetch(url + "?setor=" + setor + "&acao=" + acao, {mode:"no-cors"});
  setTimeout(atualizar, 500);
}

function atualizar() {
  fetch(url + "?listar=1")
    .then(res => res.json())
    .then(dados => {
      for (let setor in dados) {
        let el = document.getElementById(setor);

        if (dados[setor] == 1) {
          el.innerText = "Ocupado";
          el.className = "status ocupado";
        } else {
          el.innerText = "Livre";
          el.className = "status livre";
        }
      }
    });
}

setInterval(atualizar, 3000);
atualizar();
</script>

</body>
</html>
