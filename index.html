<!DOCTYPE html>
<html>
<head>
  <title>Portaria</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f6f8;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 800px;
      margin: auto;
    }

    button {
      padding: 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .livre {
      background: green;
    }

    .ocupado {
      background: red;
    }
  </style>
</head>

<body>

  <h1>Portaria</h1>

  <div class="container">
    <button id="DP" class="livre" onclick="clicar('DP')">DP</button>
    <button id="RH" class="livre" onclick="clicar('RH')">RH</button>
    <button id="MANUTENCAO" class="livre" onclick="clicar('MANUTENCAO')">MANUTENÇÃO</button>
    <button id="NUTEC" class="livre" onclick="clicar('NUTEC')">NUTEC</button>
    <button id="QSMS" class="livre" onclick="clicar('QSMS')">QSMS</button>
    <button id="INFRAESTRUTURA" class="livre" onclick="clicar('INFRAESTRUTURA')">INFRA</button>
    <button id="SUPRIMENTOS" class="livre" onclick="clicar('SUPRIMENTOS')">SUPRIMENTOS</button>
  </div>

  <script>
    const url = "https://script.google.com/macros/s/AKfycbybca2Xxuly0C6sA6o2a1p1duiH9rUnSpJXDQdPHEYOwRuDWRsXzMFAIC7ecR85HPA/exec";

    function clicar(setor) {
      fetch(url + "?setor=" + setor)
        .then(() => atualizar());
    }

    function atualizar() {
      fetch(url)
        .then(res => res.json())
        .then(data => {
          for (let setor in data) {
            let botao = document.getElementById(setor);
            if (data[setor] == 1) {
              botao.className = "ocupado";
            } else {
              botao.className = "livre";
            }
          }
        });
    }

    atualizar();
  </script>

</body>
</html>
